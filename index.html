<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Gemini API</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gemini API">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<style>
  :root{
    --bg: #ffffff;
    --panel: #f5f5f5;
    --panel-2: #ececec;
    --border: #d9d9d9;
    --text: #111111;
    --muted: #6b6b6b;
    --accent: #000000;
    --accent-dim: #2b2b2b;
    --user-bubble: #111111;
    --user-text: #ffffff;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{height:100%;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    height:100vh; height:100dvh; overflow:hidden;
  }
  #app-scale-wrapper{
    display:flex; height:100vh; height:100dvh; width:100%;
    transform-origin:top left;
  }
  /* Sidebar */
  #sidebar{
    width:270px; background:var(--panel); border-right:1px solid var(--border);
    display:flex; flex-direction:column; flex-shrink:0;
  }
  #sidebar-header{
    padding:16px; border-bottom:1px solid var(--border);
  }
  #brand{
    font-family:var(--mono); font-size:13px; color:var(--accent); letter-spacing:1px;
    text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px;
  }
  #brand .dot{width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent);}
  #new-chat{
    width:100%; padding:10px; background:var(--accent-dim); color:#ffffff; border:none;
    border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; font-family:var(--sans);
  }
  #new-chat:hover{background:#000000;}
  #io-buttons{display:flex; gap:6px; margin-top:8px;}
  #io-buttons button{
    flex:1; padding:7px 4px; background:var(--panel-2); color:var(--text); border:1px solid var(--border);
    border-radius:6px; cursor:pointer; font-size:11.5px; font-family:var(--sans);
  }
  #io-buttons button:hover{background:var(--border);}
  #model-picker{
    padding:12px 16px; border-bottom:1px solid var(--border);
  }
  #model-picker label{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; font-family:var(--mono);}
  #model-select, #provider-select{
    width:100%; margin-top:6px; margin-bottom:10px; padding:8px; background:var(--panel-2); color:var(--text);
    border:1px solid var(--border); border-radius:6px; font-size:13px;
  }
  #conversations{
    flex:1; overflow-y:auto; padding:8px;
  }
  #gemini-key-box{margin-bottom:2px;}
  #gemini-key-box input{
    width:100%; padding:7px 8px; background:var(--panel-2); color:var(--text); border:1px solid var(--border);
    border-radius:6px; font-size:12px; font-family:var(--mono);
  }
  .provider-detected{font-size:11px; margin-top:5px; display:block; font-family:var(--sans); color:var(--muted);}
  #key-history{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
  .key-chip{
    display:flex; align-items:center; gap:6px; background:var(--panel); border:1px solid var(--border);
    border-radius:8px; padding:5px 8px; font-size:11px; font-family:var(--mono); color:var(--text);
    cursor:pointer;
  }
  .key-chip:hover{background:var(--panel-2);}
  .key-chip.active-key{border-color:var(--accent-dim); background:var(--panel-2); font-weight:600;}
  .key-chip .remove-key{
    cursor:pointer; color:var(--muted); font-weight:700; padding:0 2px; font-family:var(--sans);
  }
  .key-chip .remove-key:hover{color:#c0392b;}
  .provider-detected.found{color:#1a7a34;}
  .conv-item{
    padding:10px 12px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--muted);
    margin-bottom:2px; display:flex; align-items:center; justify-content:space-between; gap:6px;
    position:relative;
  }
  .conv-item .conv-title{
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;
  }
  .conv-rename-input{
    flex:1; font-size:13px; font-family:var(--sans); color:var(--text); background:#ffffff;
    border:1px solid var(--accent-dim); border-radius:4px; padding:2px 6px;
  }
  .conv-actions{
    display:flex; gap:2px; flex-shrink:0;
  }
  .conv-action-btn{
    color:var(--muted); font-size:13px; padding:4px 6px; border-radius:4px; line-height:1;
    background:none; border:none; cursor:pointer; font-family:var(--sans);
  }
  .conv-action-btn:hover{background:var(--panel); color:var(--text);}
  .conv-action-btn.danger:hover{color:#c0392b;}
  .conv-item:hover{background:var(--panel-2);}
  .conv-item.active{background:var(--panel-2); color:var(--text);}
  #status-line{
    padding:10px 16px; border-top:1px solid var(--border); font-size:11px; color:var(--muted);
    font-family:var(--mono);
  }
  #status-line .ok{color:#1a7a34;}
  #status-line .bad{color:#c0392b;}

  #zoom-control{
    padding:10px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center;
    justify-content:space-between;
  }
  .zoom-label{font-size:13px; color:var(--text);}
  .zoom-buttons{display:flex; align-items:center; gap:6px;}
  .zoom-buttons button{
    width:24px; height:24px; border-radius:6px; border:1px solid var(--border); background:var(--panel-2);
    color:var(--text); cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center;
    line-height:1; padding:0;
  }
  .zoom-buttons button:hover{background:var(--border);}
  #zoom-level{font-size:11px; color:var(--muted); font-family:var(--mono); min-width:34px; text-align:center;}

  /* Main */
  #main{flex:1; display:flex; flex-direction:column; min-width:0;}
  #chat-scroll{
    flex:1; overflow-y:auto; padding:32px 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.06) 1px, transparent 0);
    background-size: 18px 18px;
    background-color: #fcfcfc;
  }
  #chat-inner{max-width:760px; margin:0 auto; padding:0 24px; display:flex; flex-direction:column; gap:24px;}
  .msg{display:flex; gap:12px; align-items:flex-start;}
  .msg.user{flex-direction:row-reverse;}
  .avatar{
    width:28px; height:28px; border-radius:6px; flex-shrink:0; display:flex; align-items:center;
    justify-content:center; font-size:13px; font-family:var(--mono); font-weight:700;
  }
  .msg.user .avatar{background:var(--accent-dim); color:#ffffff;}
  .msg.assistant .avatar{background:var(--panel-2); color:var(--accent); border:1px solid var(--border);}
  .bubble-wrap{max-width:80%;}
  .bubble{
    padding:14px 20px; border-radius:18px; line-height:1.65; font-size:15px;
    white-space:pre-wrap; overflow-wrap:break-word;
  }
  .msg.user .bubble{background:var(--user-bubble); color:var(--user-text); min-width:48px; text-align:left;}
  .msg.user .bubble code{background:rgba(255,255,255,.15); color:var(--user-text);}
  .msg.assistant .bubble{background:transparent; padding:6px 0;}
  .bubble code{
    background:var(--panel-2); padding:2px 5px; border-radius:4px; font-family:var(--mono); font-size:13px;
  }
  .code-block{
    background:#fafafa; border:1px solid var(--border); border-radius:10px; margin:10px 0; overflow:hidden;
  }
  .code-block-header{
    display:flex; align-items:center; justify-content:space-between; padding:8px 12px;
    background:#eeeeee; border-bottom:1px solid var(--border);
  }
  .code-lang{
    font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;
  }
  .code-copy-btn{
    background:none; border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:11px;
    cursor:pointer; color:var(--text); font-family:var(--sans);
  }
  .code-copy-btn:hover{background:#ffffff;}
  .code-copy-btn.copied{color:#1a7a34; border-color:#1a7a34;}
  .code-block pre{
    background:none; border:none; margin:0; padding:14px; overflow-x:auto;
  }
  .code-block pre code{
    background:none; padding:0; font-family:var(--mono); font-size:13px; line-height:1.5;
  }
  .bubble p{margin:0 0 8px;}
  .bubble p:last-child{margin-bottom:0;}
  .bubble ul, .bubble ol{padding-left:22px; margin:6px 0;}
  .bubble li{margin:3px 0;}
  .bubble table{border-collapse:collapse; margin:10px 0; font-size:13.5px; max-width:100%; overflow-x:auto; display:block;}
  .bubble th, .bubble td{border:1px solid var(--border); padding:6px 10px; text-align:left;}
  .bubble th{background:var(--panel-2); font-weight:600;}
  .bubble blockquote{
    border-left:3px solid var(--border); margin:8px 0; padding:2px 12px; color:var(--muted);
  }
  .bubble hr{border:none; border-top:1px solid var(--border); margin:12px 0;}
  .bubble h1, .bubble h2, .bubble h3, .bubble h4{margin:12px 0 6px; line-height:1.3;}
  .bubble h1:first-child, .bubble h2:first-child, .bubble h3:first-child{margin-top:0;}
  .bubble a{color:inherit; text-decoration:underline; text-underline-offset:2px;}
  .msg.user .bubble blockquote{color:rgba(255,255,255,.75); border-left-color:rgba(255,255,255,.35);}
  .msg.user .bubble th, .msg.user .bubble td{border-color:rgba(255,255,255,.25);}
  .msg.user .bubble th{background:rgba(255,255,255,.1);}
  .msg-actions{
    display:flex; gap:8px; margin-top:4px;
  }
  .copy-btn{
    background:none; border:none; color:var(--muted); font-size:12px; cursor:pointer;
    padding:2px 6px; border-radius:5px; display:flex; align-items:center; gap:4px; font-family:var(--sans);
  }
  .copy-btn:hover{background:var(--panel-2); color:var(--text);}
  .copy-btn.copied{color:#1a7a34;}
  .edit-textarea{
    width:100%; min-height:44px; padding:12px 16px; border-radius:14px; border:1px solid var(--accent-dim);
    background:#ffffff; color:var(--text); font-family:var(--sans); font-size:15px; line-height:1.5;
    resize:none;
  }
  .edit-actions{display:flex; gap:8px; margin-top:6px;}
  .edit-save-btn, .edit-cancel-btn{
    padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer; font-family:var(--sans); border:none;
  }
  .edit-save-btn{background:var(--accent-dim); color:#ffffff;}
  .edit-save-btn:hover{background:#000000;}
  .edit-cancel-btn{background:var(--panel-2); color:var(--text);}
  .edit-cancel-btn:hover{background:var(--border);}
  #empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--muted); text-align:center; gap:8px;
  }
  #empty-state .big{font-family:var(--mono); font-size:22px; color:var(--text);}
  #empty-state .small{font-size:13px; max-width:400px;}

  #input-area{
    border-top:1px solid var(--border); padding:16px 24px 20px; background:var(--bg);
  }
  #input-inner{max-width:760px; margin:0 auto; display:flex; gap:10px; align-items:flex-end;}
  #attach-preview{
    max-width:760px; margin:0 auto 10px; display:flex; flex-wrap:wrap; gap:8px;
  }
  .file-chip{
    display:flex; align-items:center; gap:6px; background:var(--panel); border:1px solid var(--border);
    border-radius:8px; padding:6px 10px; font-size:12px; font-family:var(--mono); color:var(--text);
  }
  .file-chip .remove-chip{
    cursor:pointer; color:var(--muted); font-weight:700; padding:0 2px;
  }
  .file-chip .remove-chip:hover{color:#e07a5f;}
  .msg-attachments{
    display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px;
  }
  .msg-attachments .file-chip{opacity:.85;}
  #attach-btn{
    background:var(--panel); color:var(--muted); border:1px solid var(--border); border-radius:10px;
    width:44px; height:44px; cursor:pointer; font-size:18px; flex-shrink:0; display:flex;
    align-items:center; justify-content:center;
  }
  #attach-btn:hover{color:var(--accent); border-color:var(--accent-dim);}
  #mic-btn{
    background:var(--panel); color:var(--muted); border:1px solid var(--border); border-radius:10px;
    width:44px; height:44px; cursor:pointer; font-size:18px; flex-shrink:0; display:flex;
    align-items:center; justify-content:center;
  }
  #mic-btn:hover{color:var(--accent); border-color:var(--accent-dim);}
  #mic-btn.recording{background:#c0392b; color:#ffffff; border-color:#c0392b; animation:mic-pulse 1.2s infinite;}
  @keyframes mic-pulse{0%,100%{opacity:1;} 50%{opacity:.6;}}
  .speak-btn.speaking{color:#1a7a34;}
  #prompt{
    flex:1; background:var(--panel); border:1px solid var(--border); border-radius:10px;
    color:var(--text); padding:12px 14px; font-size:15px; font-family:var(--sans); resize:none;
    max-height:200px; line-height:1.4;
  }
  #prompt:focus{outline:none; border-color:var(--accent-dim);}
  #send-btn{
    background:var(--accent-dim); color:#ffffff; border:none; border-radius:50%; width:44px; height:44px;
    cursor:pointer; font-size:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  #send-btn svg{width:20px; height:20px;}
  #send-btn:hover{background:#000000;}
  #send-btn:disabled{background:var(--panel-2); color:var(--muted); cursor:not-allowed;}
  #stop-btn{
    background:#c0392b; color:#ffffff; border:none; border-radius:50%; width:44px; height:44px;
    cursor:pointer; font-size:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  #stop-btn:hover{background:#a5301f;}
  .typing-dot{
    display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent);
    margin-right:3px; animation:pulse 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2){animation-delay:.2s;}
  .typing-dot:nth-child(3){animation-delay:.4s;}
  @keyframes pulse{0%,80%,100%{opacity:.3;} 40%{opacity:1;}}

  /* Topbar mobile */
  #mobile-topbar{
    display:none; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border);
    background:var(--bg); flex-shrink:0;
  }
  #hamburger-btn{
    background:none; border:none; font-size:20px; cursor:pointer; color:var(--text); padding:4px 6px;
    line-height:1;
  }
  #mobile-topbar .title{font-family:var(--mono); font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

  #sidebar-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:40;
  }

  @media (max-width: 768px){
    #mobile-topbar{display:flex;}
    #sidebar{
      position:fixed; top:0; bottom:0; left:0; width:82vw; max-width:300px; z-index:50;
      transform:translateX(-100%); transition:transform .22s ease; box-shadow:2px 0 24px rgba(0,0,0,.18);
    }
    #sidebar.open{transform:translateX(0);}
    #sidebar-overlay.open{display:block;}
    #chat-inner{padding:0 14px;}
    .bubble-wrap{max-width:88%;}
    .bubble{font-size:14.5px;}
    #input-area{padding:10px 12px 14px;}
    #input-inner{gap:8px;}
    #prompt{font-size:16px;} /* evita zoom automático no iOS */
    .avatar{width:24px; height:24px;}
    #empty-state{padding:0 20px;}
  }
</style>
</head>
<body>

<div id="app-scale-wrapper">
<div id="sidebar">
  <div id="sidebar-header">
    <div id="brand"><span class="dot"></span> Gemini API</div>
    <button id="new-chat">+ Nova conversa</button>
    <div id="io-buttons">
      <button id="export-btn" type="button">⬇ Exportar</button>
      <button id="import-btn" type="button">⬆ Importar</button>
      <input type="file" id="import-file-input" accept=".json" style="display:none">
    </div>
  </div>
  <div id="model-picker">
    <div id="gemini-key-box" style="display:block;">
      <input type="password" id="gemini-key-input" placeholder="Cole sua chave de API (Gemini, Claude, Grok ou DeepSeek)">
      <span class="provider-detected" id="provider-detected"></span>
      <div id="key-history"></div>
    </div>
    <label>Provedor</label>
    <select id="provider-select">
      <option value="auto">Automático (detectar pela chave)</option>
      <option value="gemini">Gemini</option>
      <option value="claude">Claude</option>
      <option value="grok">Grok (xAI)</option>
      <option value="groq">Groq</option>
      <option value="deepseek">DeepSeek</option>
    </select>
    <label>Modelo</label>
    <select id="model-select"><option>Cole uma chave primeiro</option></select>
  </div>
  <div id="zoom-control">
    <span class="zoom-label">🔍 Zoom</span>
    <div class="zoom-buttons">
      <button id="zoom-out" type="button">－</button>
      <span id="zoom-level">100%</span>
      <button id="zoom-in" type="button">＋</button>
    </div>
  </div>
  <div id="conversations"></div>
  <div id="status-line" role="status" aria-live="polite">verificando conexão...</div>
</div>

<div id="sidebar-overlay"></div>

<div id="main">
  <div id="mobile-topbar">
    <button id="hamburger-btn">☰</button>
    <span class="title" id="mobile-title">Gemini API</span>
  </div>
  <div id="chat-scroll">
    <div id="empty-state">
      <div class="big">Gemini API</div>
      <div class="small">Cole sua chave de API do Gemini ao lado e comece a conversar.</div>
    </div>
    <div id="chat-inner" style="display:none;"></div>
  </div>
  <div id="input-area">
    <div id="attach-preview"></div>
    <div id="input-inner">
      <input type="file" id="file-input" multiple style="display:none" accept=".txt,.md,.html,.htm,.css,.js,.py,.json,.csv,.xml,.yml,.yaml,.java,.c,.cpp,.ts,.jsx,.tsx,.sh,.log,.ini,.conf">
      <button id="attach-btn" title="Anexar arquivo">📎</button>
      <button id="mic-btn" title="Enviar mensagem por voz" type="button">🎤</button>
      <textarea id="prompt" rows="1" placeholder="Envie uma mensagem..."></textarea>
      <button id="send-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg></button>
      <button id="stop-btn" style="display:none;">■</button>
    </div>
  </div>
</div>
</div>

<script>
let conversations = []; // carregado do IndexedDB de forma assíncrona logo abaixo (ver loadConversations)
let activeConvoId = sessionStorage.getItem('ollama_active_convo') || null;
let currentModel = null;
let isStreaming = false;

function setActiveConvo(id){
  activeConvoId = id;
  sessionStorage.setItem('ollama_active_convo', id || '');
}

const $ = id => document.getElementById(id);
const modelSelect = $('model-select');
const convosEl = $('conversations');
const chatInner = $('chat-inner');
const emptyState = $('empty-state');
const chatScroll = $('chat-scroll');
const promptEl = $('prompt');
const sendBtn = $('send-btn');
const stopBtn = $('stop-btn');
const statusLine = $('status-line');
const attachBtn = $('attach-btn');
const fileInput = $('file-input');
const attachPreview = $('attach-preview');

let attachedFiles = []; // [{name, content}]
const MAX_FILE_CHARS = 30000;
let currentController = null;

const PROVIDERS = {
  gemini: {
    label: 'Gemini',
    match: k => /^(AQ\.|AIza)/.test(k),
    models: [
      {id:'gemini-3.5-flash', label:'Gemini 3.5 Flash'},
      {id:'gemini-3.1-flash-lite', label:'Gemini 3.1 Flash-Lite'},
      {id:'gemini-3-flash-preview', label:'Gemini 3 Flash (preview)'}
    ]
  },
  claude: {
    label: 'Claude',
    match: k => k.startsWith('sk-ant-'),
    models: [
      {id:'claude-sonnet-5', label:'Claude Sonnet 5'},
      {id:'claude-opus-4-8', label:'Claude Opus 4.8'},
      {id:'claude-haiku-4-5-20251001', label:'Claude Haiku 4.5'}
    ]
  },
  grok: {
    label: 'Grok (xAI)',
    match: k => k.startsWith('xai-'),
    models: [
      {id:'grok-4.5', label:'Grok 4.5'},
      {id:'grok-4.3', label:'Grok 4.3'}
    ]
  },
  deepseek: {
    label: 'DeepSeek',
    match: k => k.startsWith('sk-'), // checado por último: pega o que sobrar de "sk-" (Claude já foi capturado antes por sk-ant-)
    models: [
      {id:'deepseek-v4-flash', label:'DeepSeek V4 Flash'},
      {id:'deepseek-v4-pro', label:'DeepSeek V4 Pro (raciocínio)'}
    ]
  },
  groq: {
    label: 'Groq',
    match: k => k.startsWith('gsk_'),
    models: [
      {id:'openai/gpt-oss-120b', label:'GPT-OSS 120B (Groq)'},

const PROVIDER_DETECT_ORDER = ['gemini', 'claude', 'grok', 'groq', 'deepseek'];

function detectProvider(key){
  for(const id of PROVIDER_DETECT_ORDER){
    if(PROVIDERS[id].match(key)) return id;
  }
  return null;
}

let keyStore = {};
try{ keyStore = JSON.parse(localStorage.getItem('api_key_store') || '{}'); }catch(e){ keyStore = {}; }

let manualProvider = localStorage.getItem('manual_provider') || 'auto';
let activeProviderId = null;
let apiKey = '';

function persistKeyStore(){
  localStorage.setItem('api_key_store', JSON.stringify(keyStore));
}

function saveKeyForProvider(providerId, key){
  if(!providerId) return;
  keyStore[providerId] = key;
  persistKeyStore();
}

function loadSavedKeys(){
  // todas as chaves guardadas (uma por provedor) — usadas pra montar os chips de atalho
  return Object.entries(keyStore).filter(([id, k]) => k);
}

function maskKey(k){
  return k.length > 8 ? '••••' + k.slice(-4) : '••••';
}

function renderKeyHistory(){
  keyHistoryEl.innerHTML = '';
  loadSavedKeys().forEach(([providerId, k]) => {
    const chip = document.createElement('div');
    chip.className = 'key-chip' + (k === apiKey && providerId === activeProviderId ? ' active-key' : '');
    const label = PROVIDERS[providerId] ? PROVIDERS[providerId].label : providerId;
    chip.innerHTML = `${label} ${maskKey(k)} <span class="remove-key" title="Remover chave salva">✕</span>`;
    chip.addEventListener('click', (e) => {
      if(e.target.classList.contains('remove-key')) return;
      manualProvider = providerId;
      providerSelect.value = providerId;
      localStorage.setItem('manual_provider', manualProvider);
      loadKeyIntoField();
    });
    chip.querySelector('.remove-key').addEventListener('click', (e) => {
      e.stopPropagation();
      delete keyStore[providerId];
      persistKeyStore();
      if(providerId === activeProviderId){
        apiKey = '';
        geminiKeyInput.value = '';
        updateKeyStatus();
      }
      renderKeyHistory();
    });
    keyHistoryEl.appendChild(chip);
  });
}

function resolveProvider(){
  return manualProvider !== 'auto' ? manualProvider : detectProvider(apiKey);
}

function updateKeyStatus(){

    providerDetectedEl.textContent = '';

    providerDetectedEl.className = 'provider-detected found';
    statusLine.innerHTML = `<span class="ok">●</span> usando ${PROVIDERS[activeProviderId].label}`;
  }else{
    providerDetectedEl.textContent = '⚠ Provedor não identificado — selecione manualmente abaixo';

// --- Armazenamento das conversas via IndexedDB ---
// Antes usávamos localStorage (limite rígido de ~5-10MB, arriscado com anexos grandes).
// IndexedDB aguenta muito mais dado com segurança, sem risco de estourar cota silenciosamente.
const IDB_NAME = 'ollama_chat_db';
const IDB_STORE = 'kv';
let idbInstance = null;

function openIDB(){
  return new Promise((resolve, reject) => {
    if(!('indexedDB' in window)){ reject(new Error('IndexedDB não disponível neste navegador')); return; }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function getIDB(){
  if(!idbInstance) idbInstance = await openIDB();
  return idbInstance;
}

async function idbSet(key, value){
  const db = await getIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

async function idbGet(key){
  const db = await getIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

// Carrega as conversas do IndexedDB; se estiver vazio, migra uma única vez os dados
// antigos que possam existir no localStorage (versões anteriores deste app).
async function loadConversations(){
  try{
    const stored = await idbGet('conversations');
    if(stored && stored.length) return stored;
  }catch(e){
    console.error('Erro ao ler IndexedDB, tentando localStorage como respaldo:', e);
  }
  try{
    const legacy = JSON.parse(localStorage.getItem('ollama_chat_convos') || '[]');
    if(legacy.length){
      await idbSet('conversations', legacy).catch(() => {});
      return legacy;
    }
  }catch(e){ /* nada pra migrar */ }
  return [];
}

function startRenameConvo(c, titleEl){

    const newTitle = input.value.trim();
    c.title = newTitle || c.title;

    renderConvoList();

  input.addEventListener('blur', commit);
  input.addEventListener('click', (e) => e.stopPropagation());
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Configura o marked pra gerar blocos de código no nosso formato (cabeçalho + botão de copiar)
let markedConfigured = false;
function configureMarked(){
  if(markedConfigured || typeof marked === 'undefined') return;
  const renderer = new marked.Renderer();
  renderer.code = (code, lang) => {
    const codeText = typeof code === 'string' ? code : (code && code.text) || '';
    const language = (typeof lang === 'string' && lang) || (code && code.lang) || 'código';
    return `<div class="code-block"><div class="code-block-header"><span class="code-lang">${escapeHtml(String(language))}</span><button class="code-copy-btn">⧉ Copiar</button></div><pre><code>${escapeHtml(codeText)}</code></pre></div>`;
  };
  marked.setOptions({ renderer, breaks: true });
  markedConfigured = true;
}

function formatContent(text){
  // Markdown completo (tabelas, listas, citações, links...) via marked + sanitização contra XSS via DOMPurify.
  // Se as bibliotecas não carregarem (ex: sem internet), cai num formatador básico só com blocos de código.
  if(typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined'){
    try{
      configureMarked();
      const rawHtml = marked.parse(text);
      return DOMPurify.sanitize(rawHtml, { ADD_ATTR: ['target'] });
    }catch(e){
      console.error('Erro ao renderizar Markdown, usando formatação básica:', e);
    }
  }
  return formatContentFallback(text);
}

function formatContentFallback(text){
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
    const label = lang ? lang : 'código';
    return `<div class="code-block"><div class="code-block-header"><span class="code-lang">${label}</span><button class="code-copy-btn">⧉ Copiar</button></div><pre><code>${code.trim()}</code></pre></div>`;
  });
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  return html;
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.code-copy-btn');
  if(!btn) return;
  const block = btn.closest('.code-block');
  const codeEl = block.querySelector('pre code');
  navigator.clipboard.writeText(codeEl.innerText).then(() => {
    const original = btn.textContent;
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1500);
  });
});

function appendMessageEl(role, content, scroll=true, attachments=[], msgIndex=null){
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'Você' : 'IA';
  avatar.style.fontSize = role === 'user' ? '10px' : '12px';
  const bubbleWrap = document.createElement('div');
  bubbleWrap.className = 'bubble-wrap';
  if(attachments && attachments.length){
    const attWrap = document.createElement('div');
    attWrap.className = 'msg-attachments';
    attachments.forEach(name => {
      const chip = document.createElement('div');
      chip.className = 'file-chip';
      chip.innerHTML = `📄 ${escapeHtml(name)}`;
      attWrap.appendChild(chip);
    });
    bubbleWrap.appendChild(attWrap);
  }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatContent(content);
  bubbleWrap.appendChild(bubble);

  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = '⧉ Copiar';
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(bubble.innerText).then(() => {
      copyBtn.textContent = '✓ Copiado';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = '⧉ Copiar'; copyBtn.classList.remove('copied'); }, 1500);
    });
  });
  actions.appendChild(copyBtn);

  if(role === 'assistant' && 'speechSynthesis' in window){
    const speakBtn = document.createElement('button');
    speakBtn.className = 'copy-btn speak-btn';
    speakBtn.textContent = '🔊 Ouvir';
    speakBtn.addEventListener('click', () => {
      if(speakBtn.classList.contains('speaking')){
        speechSynthesis.cancel();
        speakBtn.textContent = '🔊 Ouvir';
        speakBtn.classList.remove('speaking');
        return;
      }
      speechSynthesis.cancel(); // interrompe qualquer outra leitura em andamento antes de começar essa
      const utterance = new SpeechSynthesisUtterance(bubble.innerText);
      utterance.lang = 'pt-BR';
      const restore = () => { speakBtn.textContent = '🔊 Ouvir'; speakBtn.classList.remove('speaking'); };
      utterance.onend = restore;
      utterance.onerror = restore;
      speakBtn.textContent = '⏹ Parar';
      speakBtn.classList.add('speaking');
      speechSynthesis.speak(utterance);
    });
    actions.appendChild(speakBtn);
  }

  if(role === 'user' && msgIndex !== null){
    const editBtn = document.createElement('button');
    editBtn.className = 'copy-btn';
    editBtn.textContent = '✏️ Editar';
    editBtn.addEventListener('click', () => {
      if(isStreaming) return;
      enterEditMode(msgIndex, bubbleWrap, content);
    });
    actions.appendChild(editBtn);
  }

  bubbleWrap.appendChild(actions);

  wrap.appendChild(avatar);
  wrap.appendChild(bubbleWrap);
  chatInner.appendChild(wrap);
  if(scroll) chatScroll.scrollTop = chatScroll.scrollHeight;
  return bubble;
}

function enterEditMode(msgIndex, bubbleWrap, originalText){
  bubbleWrap.innerHTML = '';
  const textarea = document.createElement('textarea');
  textarea.className = 'edit-textarea';
  textarea.value = originalText;
  bubbleWrap.appendChild(textarea);
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 300) + 'px';
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 300) + 'px';
  });

  const editActions = document.createElement('div');
  editActions.className = 'edit-actions';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'edit-save-btn';
  saveBtn.textContent = 'Salvar e reenviar';
  saveBtn.addEventListener('click', async () => {
    const newText = textarea.value.trim();
    if(!newText) return;
    const convo = conversations.find(c => c.id === activeConvoId);
    if(!convo) return;
    // remove essa mensagem e tudo que veio depois (a resposta antiga ficaria desatualizada)
    convo.messages = convo.messages.slice(0, msgIndex);
    convo.messages.push({role:'user', content:newText, displayText:newText, attachments:[]});

    renderConvoList();
    renderMessages();

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'edit-cancel-btn';
  cancelBtn.textContent = 'Cancelar';
  cancelBtn.addEventListener('click', () => renderMessages());

  editActions.appendChild(saveBtn);

  bubbleWrap.appendChild(editActions);
  textarea.focus();
}

// --- Envio de mensagem por voz (usa o reconhecimento de fala nativo do navegador, sem custo de API) ---
const micBtn = $('mic-btn');
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isRecording = false;

if(!SpeechRecognitionAPI){
  micBtn.style.display = 'none'; // navegador sem suporte (ex: Firefox) — esconde o botão em vez de dar erro
}else{
  micBtn.addEventListener('click', () => {
    if(isRecording){
      recognition.stop();
      return;
    }
    recognition = new SpeechRecognitionAPI();
    recognition.lang = 'pt-BR';
    recognition.continuous = false;
    recognition.interimResults = true;

    const baseText = promptEl.value ? promptEl.value.trim() + ' ' : '';
    let finalText = '';

    recognition.onstart = () => {
      isRecording = true;
      micBtn.classList.add('recording');
      micBtn.title = 'Gravando... clique pra parar';
    };
    recognition.onresult = (e) => {
      let interim = '';
      for(let i = e.resultIndex; i < e.results.length; i++){
        const transcript = e.results[i][0].transcript;
        if(e.results[i].isFinal){
          finalText += transcript + ' ';
        }else{
          interim += transcript;
        }
      }
      promptEl.value = baseText + finalText + interim;
      promptEl.style.height = 'auto';
      promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + 'px';
    };
    recognition.onerror = (e) => {
      if(e.error !== 'no-speech' && e.error !== 'aborted'){
        alert('Não foi possível usar o microfone: ' + e.error + '. Verifique se o navegador tem permissão de microfone.');
      }
    };
    recognition.onend = () => {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.title = 'Enviar mensagem por voz';
      promptEl.value = (baseText + finalText).trim();
    };
    recognition.start();
  });
}

  }
  const payload = {
    app: 'ollama-chat-export',
    exported_at: new Date().toISOString(),
    conversations: conversations
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dataStr = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `conversas-ollama-${dataStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

importBtn.addEventListener('click', () => importFileInput.click());

importFileInput.addEventListener('change', async () => {
  const file = importFileInput.files[0];
  importFileInput.value = '';
  if(!file) return;
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    const incoming = Array.isArray(data) ? data : (Array.isArray(data.conversations) ? data.conversations : null);
    if(!incoming) throw new Error('Formato inválido: esperado um arquivo exportado por este chat.');

    const existingIds = new Set(conversations.map(c => c.id));
    let importedCount = 0;
    incoming.forEach(c => {
      if(!c || !Array.isArray(c.messages)) return;
      let id = c.id ? String(c.id) : Date.now().toString() + Math.random().toString(36).slice(2,6);
      while(existingIds.has(id)){
        id = id + '_' + Math.random().toString(36).slice(2,4);
      }
      existingIds.add(id);
      conversations.push({
        id: id,
        title: c.title || 'Conversa importada',
        messages: c.messages,
        model: c.model || null,
        provider: c.provider || null
      });
      importedCount++;
    });

    if(importedCount === 0){
      alert('Nenhuma conversa válida encontrada nesse arquivo.');
      return;
    }
    saveConvos();
    renderConvoList();
    alert(`${importedCount} conversa(s) importada(s) com sucesso.`);
  }catch(e){
    alert('Não foi possível importar esse arquivo: ' + e.message);
  }
});

async function sendMessage(){
  const text = promptEl.value.trim();
  if((!text && attachedFiles.length === 0) || isStreaming) return;

  if(!apiKey){
    alert('Cole sua chave de API antes de enviar.');
    return;
  }
  if(!activeProviderId){
    alert('Não consegui identificar o provedor dessa chave. Selecione manualmente no campo "Provedor" na barra lateral.');
    return;
  }

  if(!activeConvoId) newConvo();
  const convo = conversations.find(c => c.id === activeConvoId);

  const filesToSend = attachedFiles.slice();
  let fullContent = text;
  filesToSend.forEach(f => {
    fullContent += `\n\n--- Arquivo: ${f.name}${f.truncated ? ' (truncado)' : ''} ---\n${f.content}`;
  });
  const displayText = text || '(arquivo anexado sem mensagem)';

  convo.messages.push({
    role:'user',
    content: fullContent,
    displayText: displayText,
    attachments: filesToSend.map(f => f.name)
  });
  if(convo.title === 'Nova conversa') convo.title = displayText.slice(0, 40);
  saveConvos();
  renderConvoList();
  renderMessages();
  promptEl.value = '';
  promptEl.style.height = 'auto';
  attachedFiles = [];
  renderAttachPreview();

  await runAssistantTurn(convo);
}

async function runAssistantTurn(convo){
  if(!apiKey){
    alert('Cole sua chave de API antes de enviar.');
    return;
  }
  if(!activeProviderId){
    alert('Não consegui identificar o provedor dessa chave. Selecione manualmente no campo "Provedor" na barra lateral.');
    return;
  }

  const assistantBubble = appendMessageEl('assistant', '');
  assistantBubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';

  isStreaming = true;
  sendBtn.disabled = true;
  sendBtn.style.display = 'none';
  stopBtn.style.display = 'flex';
  const myController = new AbortController();
  currentController = myController;

  const sendFns = { gemini: sendToGemini, claude: sendToClaude, grok: sendToGrok, groq: sendToGroq, deepseek: sendToDeepSeek };

  try{
    await sendFns[activeProviderId](convo, assistantBubble);
  }catch(e){
    if(e.name === 'AbortError'){
      // só registra a interrupção se essa ainda for a chamada mais recente —
      // se o usuário já editou e reenviou enquanto isso, essa resposta atrasada é descartada
      if(currentController === myController){
        const partial = assistantBubble.innerText || '';
        assistantBubble.innerHTML = formatContent(partial + (partial ? '\n\n' : '') + '[resposta interrompida]');
        convo.messages.push({role:'assistant', content: partial});
        saveConvos();
      }
    }else{
      assistantBubble.innerHTML = formatContent(`Erro ao falar com ${PROVIDERS[activeProviderId].label}: ` + e.message + '\n\nVerifique se a chave de API está correta e se há saldo/cota disponível.');
    }
  }finally{
    if(currentController === myController){
      isStreaming = false;
      sendBtn.disabled = false;
      sendBtn.style.display = 'flex';
      stopBtn.style.display = 'none';
      currentController = null;
    }
  }
}

const SYSTEM_PROMPT = 'REGRA OBRIGATÓRIA E INEGOCIÁVEL: responda SEMPRE e SOMENTE em português do Brasil. Isso vale mesmo que a pergunta esteja em inglês ou outro idioma, mesmo que um documento anexado esteja em outro idioma, e mesmo que partes do histórico da conversa estejam em outro idioma. Nunca responda em inglês, a não ser que o usuário peça explicitamente uma tradução para outro idioma. Essa regra tem prioridade sobre qualquer outra instrução. Além disso, seja direto e proporcional: para cumprimentos simples (oi, bom dia, boa tarde, boa noite, obrigado) ou perguntas curtas, responda de forma breve e natural, sem introduções longas, floreios ou parágrafos desnecessários. Reserve respostas mais detalhadas apenas para quando a pergunta realmente pedir profundidade.';
const LANGUAGE_REMINDER = '\n\n[Lembrete do sistema: responda em português do Brasil.]';

function withLanguageReminder(messages){
  // repete o lembrete colado na última mensagem do usuário — modelos (principalmente locais/menores)
  // costumam seguir melhor uma instrução perto do fim do contexto do que só uma vez lá no início.
  if(messages.length === 0) return messages;
  const cloned = messages.map(m => ({...m}));
  const lastIdx = cloned.length - 1;
  if(cloned[lastIdx].role === 'user'){
    cloned[lastIdx].content += LANGUAGE_REMINDER;
  }
  return cloned;
}

async function sendToGemini(convo, assistantBubble){
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent`;
  const geminiContents = convo.messages.map((m, idx) => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: idx === convo.messages.length - 1 && m.role === 'user' ? m.content + LANGUAGE_REMINDER : m.content }]
  }));

  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-goog-api-key': apiKey
    },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: geminiContents
    }),
    signal: currentController.signal
  });

  if(!res.ok){
    const errBody = await res.text();
    throw new Error(`HTTP ${res.status} — ${errBody.slice(0,200)}`);
  }

  const data = await res.json();
  const candidate = (data.candidates || [])[0];
  const fullText = candidate ? (candidate.content.parts || []).map(p => p.text || '').join('') : '(sem resposta)';
  assistantBubble.innerHTML = formatContent(fullText);
  chatScroll.scrollTop = chatScroll.scrollHeight;

  convo.messages.push({role:'assistant', content: fullText});
  saveConvos();
}

async function sendToClaude(convo, assistantBubble){
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: currentModel,
      max_tokens: 4096,
      system: SYSTEM_PROMPT,
      messages: withLanguageReminder(convo.messages.map(m => ({role: m.role, content: m.content}))),
      stream: true
    }),
    signal: currentController.signal
  });

  if(!res.ok){
    const errBody = await res.text();
    throw new Error(`HTTP ${res.status} — ${errBody.slice(0,200)}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  let buffer = '';

  while(true){
    const {done, value} = await reader.read();
    if(done) break;
    buffer += decoder.decode(value, {stream:true});
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for(const line of lines){
      const trimmed = line.trim();
      if(!trimmed.startsWith('data:')) continue;
      const payload = trimmed.slice(5).trim();
      if(!payload) continue;
      try{
        const json = JSON.parse(payload);
        if(json.type === 'content_block_delta' && json.delta && json.delta.type === 'text_delta'){
          fullText += json.delta.text;
          assistantBubble.innerHTML = formatContent(fullText);
          chatScroll.scrollTop = chatScroll.scrollHeight;
        }
      }catch(e){ /* linha incompleta, ignora */ }
    }
  }

  convo.messages.push({role:'assistant', content: fullText});
  saveConvos();
}

// Formato compartilhado entre Grok (xAI) e DeepSeek: ambos são compatíveis com a API da OpenAI
async function streamOpenAICompatible(url, convo, assistantBubble){
  const res = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: currentModel,
      messages: [{role:'system', content: SYSTEM_PROMPT}, ...withLanguageReminder(convo.messages.map(m => ({role: m.role, content: m.content})))],
      stream: true
    }),
    signal: currentController.signal
  });

  if(!res.ok){
    const errBody = await res.text();
    throw new Error(`HTTP ${res.status} — ${errBody.slice(0,200)}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  let buffer = '';

  while(true){
    const {done, value} = await reader.read();
    if(done) break;
    buffer += decoder.decode(value, {stream:true});
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for(const line of lines){
      const trimmed = line.trim();
      if(!trimmed.startsWith('data:')) continue;
      const payload = trimmed.slice(5).trim();
      if(payload === '[DONE]') continue;
      try{
        const json = JSON.parse(payload);
        const delta = json.choices && json.choices[0] && json.choices[0].delta;
        if(delta && delta.content){
          fullText += delta.content;
          assistantBubble.innerHTML = formatContent(fullText);
          chatScroll.scrollTop = chatScroll.scrollHeight;
        }
      }catch(e){ /* linha incompleta, ignora */ }
    }
  }

  convo.messages.push({role:'assistant', content: fullText});
  saveConvos();
}

async function sendToGrok(convo, assistantBubble){
  await streamOpenAICompatible('https://api.x.ai/v1/chat/completions', convo, assistantBubble);
}

async function sendToDeepSeek(convo, assistantBubble){
  await streamOpenAICompatible('https://api.deepseek.com/chat/completions', convo, assistantBubble);
}

async function sendToGroq(convo, assistantBubble){
  await streamOpenAICompatible('https://api.groq.com/openai/v1/chat/completions', convo, assistantBubble);
}

(async function initApp(){
  conversations = await loadConversations();
  if(activeConvoId && !conversations.find(c => c.id === activeConvoId)){
    activeConvoId = null;
  }

  const initialActiveConvo = conversations.find(c => c.id === activeConvoId);
  if(initialActiveConvo){
    switchToConvoProvider(initialActiveConvo);
  }else{
    updateKeyStatus();
  }
  renderConvoList();
  renderMessages();
  applyZoom();
})();

function openSidebar(){
  sidebarEl.classList.add('open');
  sidebarOverlay.classList.add('open');
}
function closeSidebar(){
  sidebarEl.classList.remove('open');
  sidebarOverlay.classList.remove('open');
}
hamburgerBtn.addEventListener('click', () => {
  sidebarEl.classList.contains('open') ? closeSidebar() : openSidebar();
});
sidebarOverlay.addEventListener('click', closeSidebar);

// fecha o menu automaticamente no celular ao criar conversa
$('new-chat').addEventListener('click', () => { if(isMobile()) closeSidebar(); });
